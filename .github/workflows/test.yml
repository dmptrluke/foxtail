name: Test
on:
  push:
    branches-ignore:
      - 'dependabot**'
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate_assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Cache Node dependencies
        id: node-cache
        uses: actions/cache@v5
        with:
          path: node_modules
          key: ${{ runner.OS }}-npm-${{ hashFiles('**/package-lock.json') }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install JS dependencies
        if: steps.node-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Generate assets
        run: npm run-script build-development

      - name: Store assets for testing
        uses: actions/upload-artifact@v7
        with:
          name: generated
          path: build
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: generate_assets

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hunter2
          POSTGRES_DB: postgres
        ports:
          # will assign a random free host port
          - 5432/tcp
        # needed because the postgres container does not provide a healthcheck
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8
        ports:
          - 6379/tcp
        options: --entrypoint redis-server

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies
        run: sudo apt-get -y install libpq5

      - name: Install Python dependencies
        run: uv sync --frozen --no-install-project --group test

      - name: Get assets
        uses: actions/download-artifact@v8
        with:
          name: generated
          path: build

      - name: Test with pytest
        env:
          PYTHONPATH: src
          TESTING: true
          SECRET_KEY: fake
          EMAIL_ASYNC: false
          RQ_ASYNC: false
          DIRECTORY_ENABLED: true
          CONTACT_EMAILS: test@example.com
          RECAPTCHA_ENABLED: false
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
          SITE_URL: test
        run: |
          uv run python -m pytest -n auto --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
