name: Test
on:
  push:
    branches-ignore:
      - 'dependabot**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Lint
        run: |
          uvx ruff check src/
          uvx ruff format --check src/

  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hunter2
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
          --mount type=tmpfs,destination=/var/lib/postgresql/data

      redis:
        image: redis:8
        ports:
          - 6379/tcp
        options: >-
          --entrypoint redis-server
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Generate assets
        run: npm run-script build-development

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies
        run: sudo apt-get -y install libpq5

      - name: Install Python dependencies
        run: uv sync --frozen --no-install-project --group test

      - name: Test with pytest
        env:
          PYTHONPATH: src
          TESTING: true
          SECRET_KEY: fake
          EMAIL_ASYNC: false
          HUEY_IMMEDIATE: "true"
          DIRECTORY_ENABLED: true
          CONTACT_EMAILS: test@example.com
          RECAPTCHA_ENABLED: false
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
          SITE_URL: http://localhost:8000
        run: |
          uv run python -m pytest -n auto --cov=apps --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results
