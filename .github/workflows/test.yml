name: Test
on:
  push:
    branches-ignore:
      - 'dependabot**'
  pull_request:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hunter2
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8
        ports:
          - 6379/tcp
        options: --entrypoint redis-server

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Generate assets
        run: npm run-script build-development

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install system dependencies
        run: sudo apt-get -y install libpq5

      - name: Install Python dependencies
        run: uv sync --frozen --no-install-project --group test

      - name: Lint
        run: |
          uv run ruff check src/
          uv run ruff format --check src/

      - name: Test with pytest
        env:
          PYTHONPATH: src
          TESTING: true
          SECRET_KEY: fake
          EMAIL_ASYNC: false
          RQ_ASYNC: false
          DIRECTORY_ENABLED: true
          CONTACT_EMAILS: test@example.com
          RECAPTCHA_ENABLED: false
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
          SITE_URL: test
        run: |
          uv run python -m pytest -n auto --cov=apps --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
