name: Test
on:
  push:
    branches-ignore:
      - 'dependabot**'
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm

      - run: npm ci

      - name: Lint
        run: |
          uvx ruff check src/
          uvx ruff format --check src/
          npx biome check --no-errors-on-unmatched
          npx stylelint "assets/**/*.scss"

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hunter2
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
          --mount type=tmpfs,destination=/var/lib/postgresql/data

      redis:
        image: redis:8
        ports:
          - 6379/tcp
        options: >-
          --entrypoint redis-server
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Generate assets
        run: npm run-script build-development

      - name: Test JavaScript
        run: npm run test:js

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install Python dependencies
        run: uv sync --locked --no-install-project --group test

      - name: Check for missing migrations
        env:
          PYTHONPATH: src
          TESTING: true
          SECRET_KEY: fake
          EMAIL_ASYNC: false
          HUEY_IMMEDIATE: "true"
          CONTACT_EMAILS: test@example.com
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
          SITE_URL: http://localhost:8000
        run: uv run python src/manage.py makemigrations --check --dry-run

      - name: Test with pytest
        env:
          PYTHONPATH: src
          TESTING: true
          SECRET_KEY: fake
          EMAIL_ASYNC: false
          HUEY_IMMEDIATE: "true"
          DIRECTORY_ENABLED: true
          CONTACT_EMAILS: test@example.com
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
          SITE_URL: http://localhost:8000
        run: |
          uv run python -m pytest -n auto --cov=apps --cov-report=xml --cov-report=term-missing --junitxml=junit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
        with:
          files: junit.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          report_type: test_results

  percy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: hunter2
          POSTGRES_DB: postgres
        ports:
          - 5432/tcp
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5
          --mount type=tmpfs,destination=/var/lib/postgresql/data

      redis:
        image: redis:8
        ports:
          - 6379/tcp
        options: >-
          --entrypoint redis-server
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 5

    env:
      PYTHONPATH: src
      TESTING: true
      SECRET_KEY: fake
      EMAIL_ASYNC: false
      HUEY_IMMEDIATE: "true"
      CONTACT_EMAILS: test@example.com
      SITE_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22.x'
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Generate assets
        run: npm run-script build-development

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install Python dependencies
        run: uv sync --locked --no-install-project --group test

      - name: Run migrations and collect static files
        env:
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
        run: |
          uv run python src/manage.py migrate --no-input
          uv run python src/manage.py collectstatic --no-input

      - name: Start Django server
        env:
          DATABASE_URL: postgres://postgres:hunter2@localhost:${{ job.services.postgres.ports['5432'] }}/postgres
          CACHE_URL: redis://localhost:${{ job.services.redis.ports[6379] }}/1
        run: |
          uv run python src/manage.py runserver 8000 &
          sleep 3
          curl -sf http://localhost:8000/health/ > /dev/null

      - name: Percy snapshot
        env:
          PERCY_TOKEN: ${{ secrets.PERCY_TOKEN }}
        run: npx percy snapshot percy.yml
