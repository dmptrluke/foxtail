name: Build & Deploy

on:
  push:
    branches-ignore:
      - 'dependabot**'
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      packages: write
      contents: read
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set Docker Metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ghcr.io/dmptrluke/foxtail
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=stable,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Login to Docker Hardened Images
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: dhi.io
          username: ${{ secrets.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          target: app
          build-args: |
            BUILD_MODE=production
            GIT_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image
        if: github.event_name != 'pull_request'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-name: ghcr.io/dmptrluke/foxtail
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: [self-hosted, deploy]
    timeout-minutes: 10
    environment: staging
    concurrency:
      group: deploy-staging
    steps:
      - name: Deploy to staging
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sudo /opt/foxtail/scripts/deploy-staging.sh

  sentry-staging:
    needs: deploy-staging
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: staging
          set_commits: auto
          ignore_missing: true

  verify-tag:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify tag is GPG-signed by repo owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/${{ github.ref_name }} --jq '.object.sha')
          TAG_INFO=$(gh api repos/${{ github.repository }}/git/tags/$TAG_SHA)

          VERIFIED=$(echo "$TAG_INFO" | jq -r '.verification.verified')
          TAGGER=$(echo "$TAG_INFO" | jq -r '.tagger.email')

          echo "Tag: ${{ github.ref_name }}"
          echo "Tagger: $TAGGER"
          echo "Verified: $VERIFIED"

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Tag ${{ github.ref_name }} is not GPG-signed or signature is invalid"
            exit 1
          fi

          if [ "$TAGGER" != "luke@dmptr.com" ]; then
            echo "::error::Tag ${{ github.ref_name }} was not signed by repo owner (signed by: $TAGGER)"
            exit 1
          fi

  deploy-production:
    needs: [build, verify-tag]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, deploy]
    timeout-minutes: 10
    environment: production
    concurrency:
      group: deploy-production
    steps:
      - name: Deploy to production
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sudo /opt/foxtail/scripts/deploy-prod.sh

  sentry-production:
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          release: ${{ github.ref_name }}
          set_commits: auto
          ignore_missing: true
