name: Build & Deploy

on:
  push:
    branches-ignore:
      - 'dependabot**'
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set Docker Metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ghcr.io/dmptrluke/foxtail
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          context: .
          target: app
          build-args: |
            BUILD_MODE=production
            GIT_SHA=${{ github.sha }}
            RELEASE_VERSION=${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: [self-hosted, deploy]
    timeout-minutes: 10
    environment: staging
    concurrency:
      group: deploy-staging
    steps:
      - name: Deploy to staging
        run: sudo /opt/foxtail/scripts/deploy-staging.sh

  sentry-staging:
    needs: deploy-staging
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@dab6548b3c03c4717878099e43782cf5be654289 # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: staging
          set_commits: auto
          ignore_missing: true

  verify-tag:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Verify tag is GPG-signed by repo owner
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/${{ github.ref_name }} --jq '.object.sha')
          TAG_INFO=$(gh api repos/${{ github.repository }}/git/tags/$TAG_SHA)

          VERIFIED=$(echo "$TAG_INFO" | jq -r '.verification.verified')
          TAGGER=$(echo "$TAG_INFO" | jq -r '.tagger.email')

          echo "Tag: ${{ github.ref_name }}"
          echo "Tagger: $TAGGER"
          echo "Verified: $VERIFIED"

          if [ "$VERIFIED" != "true" ]; then
            echo "::error::Tag ${{ github.ref_name }} is not GPG-signed or signature is invalid"
            exit 1
          fi

          if [ "$TAGGER" != "luke@dmptr.com" ]; then
            echo "::error::Tag ${{ github.ref_name }} was not signed by repo owner (signed by: $TAGGER)"
            exit 1
          fi

  deploy-production:
    needs: [build, verify-tag]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, deploy]
    timeout-minutes: 10
    environment: production
    concurrency:
      group: deploy-production
    steps:
      - name: Deploy to production
        run: sudo /opt/foxtail/scripts/deploy-prod.sh

  sentry-production:
    needs: deploy-production
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create Sentry release
        uses: getsentry/action-release@dab6548b3c03c4717878099e43782cf5be654289 # v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          release: ${{ github.ref_name }}
          set_commits: auto
          ignore_missing: true
