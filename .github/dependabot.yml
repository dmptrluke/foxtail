version: 2
updates:
- package-ecosystem: npm
  directory: "/"
  schedule:
    interval: weekly
    time: '09:00'
    timezone: Pacific/Auckland
  groups:
    npm-minor-patch:
      update-types:
        - minor
        - patch
- package-ecosystem: pip
  directory: "/requirements"
  schedule:
    interval: weekly
    time: '09:00'
    timezone: Pacific/Auckland
  groups:
    pip-minor-patch:
      update-types:
        - minor
        - patch
- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: weekly
    time: '09:00'
    timezone: Pacific/Auckland
  groups:
    actions-minor-patch:
      update-types:
        - minor
        - patch
