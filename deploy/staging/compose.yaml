# Foxtail staging stack.
# Requires a .env file -- see .env.example for all available settings.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: foxtail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxtail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    restart: unless-stopped
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/dmptrluke/foxtail:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: ["gunicorn", "--bind", "0.0.0.0:8000", "--worker-tmp-dir", "/dev/shm", "--forwarded-allow-ips", "*", "-k", "gthread", "--threads", "2", "foxtail.wsgi:application"]
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:${POSTGRES_PASSWORD}@db/foxtail"
      CACHE_URL: "redis://redis/1"
      SERVICE_NAME: "app"
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck", "http", "127.0.0.1:8000", "/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      default:
      caddy:
        aliases:
          - staging-app

  worker:
    image: ghcr.io/dmptrluke/foxtail:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:${POSTGRES_PASSWORD}@db/foxtail"
      CACHE_URL: "redis://redis/1"
      HUEY_WORKERS: "2"
      SERVICE_NAME: "worker"
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["django-admin", "run_huey"]
    healthcheck:
      test: ["CMD", "healthcheck", "file-age", "/tmp/huey-heartbeat", "120"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

networks:
  caddy:
    external: true

volumes:
  storage:   # User-uploaded media (avatars, blog images, event images)
  db:        # PostgreSQL data
  redis:     # Redis persistence (sessions, cache, task queue)
