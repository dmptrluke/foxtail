# Foxtail production compose file.
# Copy this folder and customize for your deployment.
#
# Usage:
#   docker compose up -d
#
# Requires a .env file — see .env.example for all available settings.
# Set COMPOSE_PROJECT_NAME in .env to namespace containers and volumes.

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: foxtail
      POSTGRES_PASSWORD: foxtail
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxtail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    restart: unless-stopped
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/dmptrluke/foxtail:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:foxtail@db/foxtail"
      CACHE_URL: "redis://redis/1"
      SERVICE_NAME: "app"
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health/\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - default
      - caddy

  worker:
    image: ghcr.io/dmptrluke/foxtail:latest
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:foxtail@db/foxtail"
      CACHE_URL: "redis://redis/1"
      SERVICE_NAME: "worker"
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: django-admin rqworker default
    healthcheck:
      test: ["CMD-SHELL", "django-admin rqstats --json | python -c 'import sys,json; json.load(sys.stdin)'"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  caddy:
    external: true

volumes:
  storage:   # User-uploaded media (avatars, blog images, event images)
  db:        # PostgreSQL data
  redis:     # Redis persistence (sessions, cache, task queue)
