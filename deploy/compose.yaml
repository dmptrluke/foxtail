# Foxtail production compose file.
# Copy this folder and customize for your deployment.
#
# Usage:
#   docker compose up -d
#
# Requires a .env file — see .env.example for all available settings.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: foxtail
      POSTGRES_PASSWORD: foxtail
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxtail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    volumes:
      - redis:/data

  foxtail:
    image: ghcr.io/dmptrluke/foxtail:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:foxtail@db/foxtail"
      CACHE_URL: "redis://redis/1"
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    image: ghcr.io/dmptrluke/foxtail:latest
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:foxtail@db/foxtail"
      CACHE_URL: "redis://redis/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: django-admin rqworker default

volumes:
  storage:
  db:
  redis:
