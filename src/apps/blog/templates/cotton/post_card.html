{% load image text %}

<article class="blog-card">
    {% if post.image %}
        <a href="{{ post.get_absolute_url }}" class="blog-card-image">
            <img src="{{ post.image.card }}"
                 srcset="{{ post.image.card }} 1x, {{ post.image.card_2x }} 2x"
                 alt="{{ post.title }}"
                 width="600" height="315"
                 loading="lazy" decoding="async"
                 style="object-position: {{ post.image_ppoi|ppoi_position }}">
        </a>
    {% endif %}
    <div class="blog-card-body">
        <div class="blog-card-date">{{ post.created|date:"F jS, Y" }} &middot; {{ post.text_rendered|reading_time }}</div>
        <h2><a href="{{ post.get_absolute_url }}">{{ post.title }}</a></h2>
        <p class="blog-card-excerpt">{{ post.description|default:post.text_rendered|plain_text|truncatechars:200 }}</p>
        <c-tag-row :tags="post.tags.all" url_name="blog:list" dark />
    </div>
</article>
