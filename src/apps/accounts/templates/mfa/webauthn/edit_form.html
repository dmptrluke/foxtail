{% extends 'account_base.html' %}
{% load form_tags %}

{% block title %}Edit Security Key{% endblock %}

{% block content %}
    <h3>Edit Security Key</h3>

    <form method="post">
        {% csrf_token %}
        {% text_field form.name %}
        <button type="submit" class="btn btn-primary">
            Save
        </button>
        <a href="{% url 'mfa_list_webauthn' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
{% endblock %}
