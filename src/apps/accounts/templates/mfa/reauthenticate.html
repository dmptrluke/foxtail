{% extends 'base.html' %}
{% load crispy_forms_filters %}

{% block title %}Confirm Access{% endblock %}

{% block content %}
    <p>
        Please enter the code from your authenticator app to confirm your identity.
    </p>
    <form method="post">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-primary">
            Confirm
        </button>
    </form>
{% endblock %}
