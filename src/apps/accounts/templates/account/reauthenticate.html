{% extends 'account_base.html' %}
{% load crispy_forms_filters %}

{% block title %}Confirm Access{% endblock %}

{% block content %}
    <p>
        You will need to enter your password to confirm your identity before you can continue.
    </p>
    <form method="post">
        {% csrf_token %}
        {{ form | crispy }}
        <button type="submit" class="btn btn-primary">
            Confirm
        </button>
    </form>
{% endblock %}
