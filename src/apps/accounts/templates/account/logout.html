{% extends "auth_base.html" %}

{% block title %}Sign Out{% endblock %}

{% block heading %}Sign out{% endblock %}
{% block subheading %}<p class="auth-subheading">Are you sure you want to sign out?</p>{% endblock %}

{% block content %}
    <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
        {% endif %}
        <button type="submit" class="auth-btn-primary">Sign out</button>
    </form>
{% endblock content %}
