{% load socialaccount icon %}
{% get_providers as socialaccount_providers %}

{% for provider in socialaccount_providers %}
    <div class="btn-group">
        <a title="{{ provider.name }}" class="socialaccount_provider {{ provider.sub_id }} btn btn-outline-primary mb-1"
           href="{% provider_login_url provider process=process scope=scope auth_params=auth_params %}">
            {% icon provider.sub_id colored=True %} {{ provider.name }}
        </a>
    </div>
{% endfor %}
