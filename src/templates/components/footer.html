{% load tz %}
{% get_current_timezone as TIME_ZONE %}
<footer id="footer">
    <div class="container px-3 px-md-4">
        <div>
            <nav class="footer-links">
                <a href="https://github.com/dmptrluke/foxtail" target="_blank" rel="noopener noreferrer">Source</a>
                <a href="{% url 'content:page' slug='privacy' %}">Privacy</a>
                <a href="{% url 'contact:contact' %}">Contact</a>
            </nav>
            <p class="footer-credit">Made with <c-icons.paw width="0.85em" height="0.85em" /> by <a href="https://bsky.app/profile/kapthefox.bsky.social" target="_blank" rel="noopener noreferrer">Kap</a></p>
        </div>
        <div class="footer-social">
            <a href="https://t.me/furrynz" target="_blank" rel="noopener noreferrer" title="Telegram">
                <c-icons.telegram width="1.1em" height="1.1em" />
            </a>
            <a href="https://bsky.app/profile/furry.nz" target="_blank" rel="noopener noreferrer" title="Bluesky">
                <c-icons.bluesky width="1.1em" height="1.1em" />
            </a>
            <a href="https://x.com/furrynz" target="_blank" rel="noopener noreferrer" title="X">
                <c-icons.x width="1.1em" height="1.1em" />
            </a>
            <div class="popup-wrapper">
                <button class="footer-popup-toggle" type="button" title="Theme" aria-label="Theme settings">&#x25CF;</button>
                <div class="popup-theme" hidden>
                    <div class="popup-theme-row">
                        <span class="popup-theme-label">Color</span>
                        <button class="popup-theme-option" data-scheme="plum"><span class="popup-theme-dot" style="--dot:#4a3d55"></span>Plum</button>
                        <button class="popup-theme-option" data-scheme="coffee"><span class="popup-theme-dot" style="--dot:#5c4a3a"></span>Coffee</button>
                        <button class="popup-theme-option" data-scheme="autumn"><span class="popup-theme-dot" style="--dot:#c85a20"></span>Autumn</button>
                        <button class="popup-theme-option" data-scheme="forest"><span class="popup-theme-dot" style="--dot:#3a5a3a"></span>Forest</button>
                        <button class="popup-theme-option" data-scheme="slate"><span class="popup-theme-dot" style="--dot:#4a5568"></span>Slate</button>
                    </div>
                    <div class="popup-theme-row">
                        <span class="popup-theme-label">Style</span>
                        <button class="popup-theme-option" data-style="default">Rounded</button>
                        <button class="popup-theme-option" data-style="sharp">Sharp</button>
                        <button class="popup-theme-option" data-style="retro">Retro</button>
                        <button class="popup-theme-option" data-style="glass">Glass</button>
                    </div>
                    <div class="popup-theme-row">
                        <span class="popup-theme-label">Mode</span>
                        <button class="popup-theme-option" data-mode="auto">Auto</button>
                        <button class="popup-theme-option" data-mode="light">Light</button>
                        <button class="popup-theme-option" data-mode="dark">Dark</button>
                    </div>
                </div>
            </div>
            <div class="popup-wrapper">
                <button class="footer-popup-toggle" type="button" title="Debug info" aria-label="Debug info">?</button>
                <div class="popup-debug" hidden>
                    <div class="popup-debug-row">
                        <span class="popup-debug-label">IP</span>
                        <span class="popup-debug-value">{{ DEBUG_DATA_IP }}</span>
                    </div>
                    {% if request.user.is_authenticated %}
                    <div class="popup-debug-row">
                        <span class="popup-debug-label">User</span>
                        <span class="popup-debug-value">{{ request.user.username }}</span>
                    </div>
                    {% endif %}
                    <div class="popup-debug-row">
                        <span class="popup-debug-label">Time</span>
                        <span class="popup-debug-value">{% now "c" %}</span>
                    </div>
                    <div class="popup-debug-row">
                        <span class="popup-debug-label">TZ</span>
                        <span class="popup-debug-value">{{ TIME_ZONE }}</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</footer>
