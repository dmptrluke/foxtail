{% load form_tags %}
{% if field.is_hidden %}{{ field }}{% else %}
<div class="form-check{% if not inline %} mb-3{% endif %}{% if wrapper_class %} {{ wrapper_class }}{% endif %}">
    {{ field }}
    {% if not hide_label and not inline %}<label class="form-check-label" for="{{ field.id_for_label }}">{{ field.label }}</label>{% endif %}
    {% include "components/forms/_errors.html" %}
    {% if not inline %}{% include "components/forms/_help_text.html" %}{% endif %}
</div>
{% endif %}
