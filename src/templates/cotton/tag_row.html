<c-vars tag_url="" dark="" />

{% if tags %}
    <div class="tag-row{% if dark %} tag-row-dark{% endif %}">
        {% for tag in tags %}
            {% if tag_url %}
                <a href="{% url tag_url slug=tag.slug %}" class="tag-pill">{{ tag.name|capfirst }}</a>
            {% else %}
                <span class="tag-pill">{{ tag.name|title }}</span>
            {% endif %}
        {% endfor %}
    </div>
{% endif %}
