<div class="hero hero-detail {{ hero_class }}">
    <div class="container px-3 px-md-4">
        {% if topline %}
            <div class="hero-topline">
                {{ topline }}
            </div>
        {% endif %}

        <h1>{{ title }}</h1>

        {% if subtitle %}
            <h2>{{ subtitle }}</h2>
        {% endif %}

        {{ slot }}
    </div>
</div>
