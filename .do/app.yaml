# DigitalOcean App Platform spec.

name: foxtail

services:
  - name: web
    dockerfile_path: Dockerfile
    github:
      repo: dmptrluke/foxtail
      branch: master
      deploy_on_push: true
    http_port: 8000
    instance_size_slug: basic-xxs
    instance_count: 1
    health_check:
      http_path: /health/
    run_command: gunicorn --bind 0.0.0.0:8000 --worker-tmp-dir /dev/shm --access-logfile - foxtail.wsgi:application
    envs:
      - key: SECRET_KEY
        value: REPLACE_ME
        type: SECRET
      - key: SITE_URL
        value: ${APP_URL}
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN}
      - key: CONTACT_EMAILS
        value: REPLACE_ME
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: CACHE_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: EMAIL_FROM_USER
        value: noreply@example.com
      - key: EMAIL_FROM_SYSTEM
        value: server@example.com
      - key: RECAPTCHA_ENABLED
        value: "false"

  - name: worker
    dockerfile_path: Dockerfile
    github:
      repo: dmptrluke/foxtail
      branch: master
      deploy_on_push: true
    instance_size_slug: basic-xxs
    instance_count: 1
    run_command: django-admin rqworker default
    envs:
      - key: SECRET_KEY
        value: REPLACE_ME
        type: SECRET
      - key: SITE_URL
        value: ${APP_URL}
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN}
      - key: CONTACT_EMAILS
        value: REPLACE_ME
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: CACHE_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
      - key: EMAIL_FROM_USER
        value: noreply@example.com
      - key: EMAIL_FROM_SYSTEM
        value: server@example.com

databases:
  - name: db
    engine: PG
    version: "16"
    size: db-s-dev-database
  - name: redis
    engine: REDIS
    version: "7"
    size: db-s-dev-database

jobs:
  - name: migrate
    dockerfile_path: Dockerfile
    github:
      repo: dmptrluke/foxtail
      branch: master
    instance_size_slug: basic-xxs
    kind: POST_DEPLOY
    run_command: django-admin migrate --noinput
    envs:
      - key: SECRET_KEY
        value: REPLACE_ME
        type: SECRET
      - key: SITE_URL
        value: ${APP_URL}
      - key: ALLOWED_HOSTS
        value: ${APP_DOMAIN}
      - key: CONTACT_EMAILS
        value: REPLACE_ME
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: CACHE_URL
        scope: RUN_TIME
        value: ${redis.REDIS_URL}
