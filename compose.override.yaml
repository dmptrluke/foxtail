# Dev overrides — auto-loaded by "docker compose up".
# Adds debugpy, Django dev server, and local env vars.
# All environment config lives in .env (not tracked in git).

services:
  foxtail:
    command: >
      sh -c "django-admin migrate --noinput &&
      python -m debugpy --listen 0.0.0.0:5678
      -m django runserver 0.0.0.0:8000"
    ports:
      - "5678:5678"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      vite:
        condition: service_started

  worker:
    volumes:
      - ./src:/app/src
    env_file:
      - .env

  vite:
    build:
      context: .
      target: assets
      args:
        BUILD_MODE: development
    command: npx vite
    ports:
      - "5173:5173"
    volumes:
      - ./assets:/app/assets
      - ./vite.config.mjs:/app/vite.config.mjs
