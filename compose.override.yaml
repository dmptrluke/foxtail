# Dev overrides — auto-loaded by "docker compose up".
# Adds debugpy, Django dev server, and sensible defaults for local development.

x-dev-env: &dev-env
  DEBUG: "true"
  SECRET_KEY: "dev-insecure-key-do-not-use-in-production"
  CONTACT_EMAILS: "admin@example.com"
  SITE_URL: "http://localhost:8000"
  ALLOWED_HOSTS: "localhost,127.0.0.1"
  DIRECTORY_ENABLED: "true"
  VITE_DEV_MODE: "true"

services:
  foxtail:
    command: >
      sh -c "django-admin shell -c 'from django.core.cache import cache; cache.clear()' &&
      django-admin migrate --noinput &&
      python -m debugpy --listen 0.0.0.0:5678
      -m django runserver 0.0.0.0:8000"
    ports:
      - "5678:5678"
    volumes:
      - ./src:/app/src
    environment:
      <<: *dev-env
    env_file:
      - path: .env
        required: false
    depends_on:
      vite:
        condition: service_started

  worker:
    volumes:
      - ./src:/app/src
    environment:
      <<: *dev-env
    env_file:
      - path: .env
        required: false

  vite:
    build:
      context: .
      target: assets
      args:
        BUILD_MODE: development
    command: npx vite
    ports:
      - "5173:5173"
    volumes:
      - ./assets:/app/assets
      - ./vite.config.mjs:/app/vite.config.mjs
