services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: foxtail
      POSTGRES_PASSWORD: foxtail
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxtail"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis:/data

  foxtail:
    image: dmptrluke/foxtail:latest
    build:
      context: .
      target: app
      args:
        BUILD_MODE: development
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: "postgres://foxtail:foxtail@db/foxtail"
      CACHE_URL: "redis://redis/1"
    volumes:
      - storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  test:
    build:
      context: .
      target: test
      args:
        BUILD_MODE: development
    environment:
      TESTING: "true"
      SECRET_KEY: "test-secret-key"
      SITE_URL: "http://localhost:8000"
      EMAIL_ASYNC: "false"
      RQ_ASYNC: "false"
      DIRECTORY_ENABLED: "true"
      CONTACT_EMAILS: "test@example.com"
      RECAPTCHA_ENABLED: "false"
      DATABASE_URL: "postgres://foxtail:foxtail@db/foxtail"
      CACHE_URL: "redis://redis/1"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  storage:
  db:
  redis:
